{%extends 'base.html'%}

{%block content%}
  <div class="center">
	  <form method="post" class="card" novalidate>
	  	{% csrf_token %}
	    <h2 class="text-center">Влез в твоя профил</h2>
		{% for field in form %}
	    		{{ field.label_tag }} 
	        	{{ field }}
	        	{% if field.errors %}
	        		<small>{{ field.errors|striptags  }}</small> 
	        	{% endif %}
		{% endfor %}
		
		<input type="submit" value="ВЛЕЗ" class="btn btn-primary full-width">
		<hr>
		<p class="text-center">Забравена парола <a href="{%url 'password-reset'%}">	</a></p>
		<p class="text-center">Нямаш профил <a href="{%url 'register'%}">Можеш да го създадеш</a></p>
	</form>
</div>

{%endblock content%}
