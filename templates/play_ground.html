<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>КАТЕГОРИИ</h1>

    <label for="category">Раздел</label>
    <select 
        name="category" 
        id="main-categories" 
        onchange="getSubCategories(this.value)">
        <option value="" selected="selected">---------------</option>
        {% for cat in categories%}
            <option 
                value="{{cat.id}}" 
                class="category-name">{{cat.name}}
            </option>
        {%endfor%}
    </select>
    <label for="subcategory">Категория</label>
    <select name="subcategory" id="main-subcategories">
        <option value="">---------------</option>
    </select>
       
    {{ categories|json_script:"categories" }}
    <script>
        // Извличане и парсиране на JSON данните
        const jsonData = JSON.parse(document.getElementById('categories').textContent);
        // Отпечатване на JSON обекта в конзолата
        {% comment %} 
        console.log('PARSED: ',jsonData);
        console.log('STRINGIFY: ',JSON.stringify(jsonData, null, 4)); 
        for(i=0;i<jsonData.length;i++){
            console.log(jsonData[i].name)
            for(j=0;j<jsonData[i].subcategories.length;j++){
                console.log(jsonData[i].subcategories[j].name)
            }
        }
        {% endcomment %}
        
        
        function getSubCategories(categoryID){
            console.log(categoryID)
            var selectSubCategories = document.getElementById('main-subcategories')
            if (selectSubCategories.hasChildNodes){
                while (selectSubCategories.children.length > 0){
                    selectSubCategories.removeChild(selectSubCategories.children[0])
                }
            }
            for(i=0;i<jsonData.length;i++){
                if(jsonData[i].id == categoryID){
                    for(j=0;j<jsonData[i].subcategories.length;j++){
                        console.log(jsonData[i].subcategories[j].name)
                        let newOption = document.createElement('option')
                        newOption.textContent = jsonData[i].subcategories[j].name
                        newOption.value = jsonData[i].subcategories[j].id
                        selectSubCategories.appendChild(newOption)
                    }
                    break;
                }
            }
        }
        
        
    </script>
</body>
</html>
